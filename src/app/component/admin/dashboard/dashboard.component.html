<!-- admin-dashboard.component.html -->
<div class="dashboard-wrapper">

  <!-- QR Code Button -->
  <div class="qr-section">
    <button class="qr-btn" (click)="goToQrCodes()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/>
        <rect x="18" y="14" width="3" height="3"/><rect x="14" y="18" width="3" height="3"/>
        <rect x="18" y="18" width="3" height="3"/>
      </svg>
      QR Codes
    </button>
  </div>

  <!-- Announcements List -->
  <div class="announcements-container">
    <div *ngFor="let announcement of announcements" class="announcement-card">

      <!-- Card Header -->
      <div class="card-header">
        <h3 class="announcement-title">{{ announcement.title }}</h3>
        <span class="status-badge" [ngClass]="announcement.status === 'approved' ? 'approved' : 'pending'">
          <svg *ngIf="announcement.status === 'approved'" xmlns="http://www.w3.org/2000/svg"
            width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <svg *ngIf="announcement.status === 'pending'" xmlns="http://www.w3.org/2000/svg"
            width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          {{ announcement.status === 'approved' ? 'Approved' : 'Pending Approval' }}
        </span>
      </div>

      <!-- Meta -->
      <div class="card-meta">
        <span>By {{ announcement.author }} • {{ announcement.date }}</span>
      </div>
      <div class="card-courses">{{ announcement.courses }}</div>

      <!-- Content -->
      <p class="card-content">{{ announcement.content }}</p>

      <!-- Actions for pending -->
      <div *ngIf="announcement.status === 'pending'" class="card-actions">
        <button class="approve-btn" (click)="approveAnnouncement(announcement)">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Approve
        </button>
        <button class="reject-btn" (click)="rejectAnnouncement(announcement)">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="15" y1="9" x2="9" y2="15"/>
            <line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          Reject
        </button>
      </div>

    </div>
  </div>

</div>
