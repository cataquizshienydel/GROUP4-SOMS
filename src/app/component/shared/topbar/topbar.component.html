<!-- src/app/component/shared/topbar/topbar.component.html -->
<div class="topbar">
  <!-- Left: hamburger + title -->
  <div class="topbar-left">
    <button class="hamburger-btn" (click)="onToggleSidebar()">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="6" x2="21" y2="6"/>
        <line x1="3" y1="12" x2="21" y2="12"/>
        <line x1="3" y1="18" x2="21" y2="18"/>
      </svg>
    </button>
    <div class="topbar-brand">
      <img src="assets/ustp-logo.png" alt="USTP" class="brand-logo" />
      <span class="brand-name">Student Organization</span>
    </div>
  </div>

  <!-- Right: user info + logout -->
  <div class="topbar-right">
    <div class="user-info" *ngIf="currentUser">
      <div class="user-avatar">{{ currentUser.name?.charAt(0) }}</div>
      <div class="user-details">
        <span class="user-name">{{ currentUser.name }}</span>
        <span class="user-role">{{ currentUser.role | titlecase }}</span>
      </div>
    </div>
    <button class="logout-btn" (click)="onLogout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>
</div>
