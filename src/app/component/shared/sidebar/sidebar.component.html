<!-- sidebar.component.html -->
<div class="sidebar" [class.collapsed]="!isOpen">

  <!-- User Profile Section -->
  <div class="sidebar-profile">
    <div class="profile-avatar">{{ currentUser?.name?.charAt(0) }}</div>
    <div class="profile-info" *ngIf="isOpen">
      <span class="profile-name">{{ currentUser?.name }}</span>
      <span class="profile-role">{{ role | titlecase }}</span>
    </div>
  </div>

  <div class="sidebar-divider"></div>

  <!-- Menu Items -->
  <nav class="sidebar-nav">
    <a *ngFor="let menu of menus"
       [routerLink]="menu.route"
       class="nav-item"
       [class.active]="isActive(menu.route)">

      <!-- Home icon -->
      <svg *ngIf="menu.icon === 'home'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>

      <!-- Plus icon -->
      <svg *ngIf="menu.icon === 'plus'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>

      <!-- QR icon -->
      <svg *ngIf="menu.icon === 'qr'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <line x1="14" y1="14" x2="14" y2="21"/>
        <line x1="14" y1="14" x2="21" y2="14"/>
        <line x1="21" y1="14" x2="21" y2="21"/>
        <line x1="14" y1="21" x2="21" y2="21"/>
      </svg>

      <!-- Calendar icon -->
      <svg *ngIf="menu.icon === 'calendar'" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>

      <span class="nav-label" *ngIf="isOpen">{{ menu.label }}</span>
    </a>
  </nav>
</div>
