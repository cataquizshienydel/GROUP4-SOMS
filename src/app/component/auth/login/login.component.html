
<div class="login-wrapper">
  <div class="login-card">

    
<div class="login-logo">
  <img src="assets/ustp-logo.png" alt="USTP Logo" class="logo-img"
    onerror="this.style.display='none'" />
</div>

  
    <h2 class="login-title">Student Organization</h2>
    <p class="login-subtitle">USTP - University of Science and Technology</p>

    <div class="form-group">
      <label class="form-label">Username / Email / Student ID</label>
      <div class="input-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" class="form-input" placeholder="Enter your credentials"
          [(ngModel)]="credential" name="credential" />
      </div>
    </div>

   
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" class="form-input" placeholder="Enter your password"
          [(ngModel)]="password" name="password" (keyup.enter)="onLogin()" />
      </div>
    </div>

   
    <button class="login-btn" (click)="onLogin()" [disabled]="isLoading">
      <span *ngIf="!isLoading">Log In</span>
      <span *ngIf="isLoading">logging in...</span>
    </button>

    <div class="demo-box">
      <p class="demo-title">Demo Credentials:</p>
      <p class="demo-item"><strong>Admin:</strong> admin&#64;ustp.edu.ph / admin123</p>
      <p class="demo-item"><strong>Officer:</strong> officer&#64;gmail.com / officer123</p>
      <p class="demo-item"><strong>Student:</strong> 2024303763 / student123</p>
    </div>

  </div>
</div>
