
<!-- src/app/component/auth/login/login.component.html -->
<div class="login-wrapper">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <img src="assets/ustp-logo.png" alt="USTP Logo" class="logo-img" />
    </div>

    <!-- Title -->
    <h2 class="login-title">Student Organization</h2>
    <p class="login-subtitle">Sign in to your account</p>

    <!-- Email -->
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <div class="input-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
        <input type="email" class="form-input" placeholder="Enter your email"
          [(ngModel)]="email" name="email" />
      </div>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="input-wrapper">
        <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
          viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" class="form-input" placeholder="Enter your password"
          [(ngModel)]="password" name="password" (keyup.enter)="onLogin()" />
      </div>
    </div>

    <!-- Login Button -->
    <button class="login-btn" (click)="onLogin()" [disabled]="isLoading">
      <span *ngIf="!isLoading">Sign In</span>
      <span *ngIf="isLoading">Signing in...</span>
    </button>

    <!-- Demo credentials -->
    <div class="demo-box">
      <p class="demo-title">Demo Credentials</p>
      <p class="demo-item">Admin: admin&#64;ustp.edu.ph / admin123</p>
      <p class="demo-item">Officer: officer&#64;ustp.edu.ph/ officer123</p>
      
    </div>

  </div>
</div>
