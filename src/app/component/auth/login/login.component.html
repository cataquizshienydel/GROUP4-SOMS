<!-- login.component.html -->
<div class="login-wrapper">
  <div class="login-card">

    <!-- Header -->
    <div class="login-header">
      <div class="logo-area">
        <img src="assets/ustp-logo.png" alt="USTP Logo" class="logo" onerror="this.style.display='none'" />
      </div>
      <h1 class="org-title">Student Organization</h1>
      <p class="org-subtitle">USTP - University of Science and Technology</p>
    </div>

    <!-- Role Selector -->
    <div class="role-selector">
      <button
        class="role-btn"
        [class.active]="selectedRole === 'admin'"
        (click)="selectRole('admin')"
      >
        <span class="role-icon">
          <!-- Shield Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </span>
        <span class="role-label">Admin</span>
      </button>

      <button
        class="role-btn"
        [class.active]="selectedRole === 'officer'"
        (click)="selectRole('officer')"
      >
        <span class="role-icon">
          <!-- Users Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </span>
        <span class="role-label">Officer</span>
      </button>

      <button
        class="role-btn"
        [class.active]="selectedRole === 'student'"
        (click)="selectRole('student')"
      >
        <span class="role-icon">
          <!-- Graduation Cap Icon -->
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
            <path d="M6 12v5c3 3 9 3 12 0v-5"/>
          </svg>
        </span>
        <span class="role-label">Student</span>
      </button>
    </div>

    <!-- Login Form -->
    <div class="login-form">

      <!-- Admin Form -->
      <ng-container *ngIf="selectedRole === 'admin'">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input
            type="email"
            class="form-input"
            placeholder="admin@ustp.edu.ph"
            [(ngModel)]="adminEmail"
            name="adminEmail"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-input"
            placeholder="Enter your password"
            [(ngModel)]="adminPassword"
            name="adminPassword"
          />
        </div>
      </ng-container>

      <!-- Officer Form -->
      <ng-container *ngIf="selectedRole === 'officer'">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input
            type="email"
            class="form-input"
            placeholder="officer1@gmail.com"
            [(ngModel)]="officerEmail"
            name="officerEmail"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input
            type="password"
            class="form-input"
            placeholder="Enter your password"
            [(ngModel)]="officerPassword"
            name="officerPassword"
          />
        </div>
      </ng-container>

      <!-- Student Form -->
      <ng-container *ngIf="selectedRole === 'student'">
        <div class="form-group">
          <label class="form-label">Student ID Number</label>
          <input
            type="text"
            class="form-input"
            placeholder="Enter your 10-digit student ID"
            [(ngModel)]="studentId"
            name="studentId"
            maxlength="10"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Course</label>
          <div class="select-wrapper">
            <select
              class="form-select"
              [(ngModel)]="selectedCourse"
              name="selectedCourse"
            >
              <option value="" disabled selected>Select your course</option>
              <option *ngFor="let course of courses" [value]="course">{{ course }}</option>
            </select>
            <span class="select-arrow">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </span>
          </div>
        </div>
      </ng-container>

      <!-- Login Button -->
      <button class="login-btn" (click)="onLogin()">Log In</button>
    </div>

    <!-- Divider -->
    <div class="divider"></div>

    <!-- Demo Credentials -->
    <div class="demo-credentials">
      <p class="demo-title">Demo Credentials:</p>
      <p class="demo-item"><strong>Admin:</strong> admin&#64;ustp.edu.ph / admin123</p>
      <p class="demo-item"><strong>Officer:</strong> officer1&#64;gmail.com / officer123</p>
      <p class="demo-item"><strong>Student:</strong> 2024303763 (any course)</p>
    </div>

  </div>
</div>
