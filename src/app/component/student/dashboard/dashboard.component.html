<!-- student-dashboard.component.html -->
<div class="dashboard-wrapper">

  <!-- Header -->
  <div class="dashboard-header">
    <div class="header-left">
      <h2 class="org-name">Student Organization</h2>
      <span class="role-badge">(STUDENT) - {{ studentCourse }}</span>
    </div>
    <button class="logout-btn" (click)="onLogout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>

  <!-- View Events Button -->
  <div class="action-section">
    <button class="view-events-btn" (click)="goToEvents()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      View Events
    </button>
  </div>

  <!-- Filter by Course -->
  <div class="filter-card">
    <div class="filter-label">
      <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
      Filter by course:
    </div>
    <div class="filter-buttons">
      <button class="filter-btn" [class.active]="activeFilter === 'ALL'" (click)="setFilter('ALL')">ALL</button>
      <button class="filter-btn" [class.active]="activeFilter === 'IT'" (click)="setFilter('IT')">IT</button>
      <button class="filter-btn" [class.active]="activeFilter === 'EMT'" (click)="setFilter('EMT')">EMT</button>
      <button class="filter-btn" [class.active]="activeFilter === 'TCM'" (click)="setFilter('TCM')">TCM</button>
    </div>
  </div>

  <!-- Announcements -->
  <div class="announcements-container">
    <div *ngFor="let announcement of filteredAnnouncements" class="announcement-card">

      <div class="card-header">
        <h3 class="announcement-title">{{ announcement.title }}</h3>
        <span class="status-badge approved">
          <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          Approved
        </span>
      </div>

      <div class="card-meta">By {{ announcement.author }} • {{ announcement.date }}</div>
      <div class="card-courses">{{ announcement.courses }}</div>
      <p class="card-content">{{ announcement.content }}</p>

      <!-- Image -->
      <div *ngIf="announcement.image" class="card-image">
        <img [src]="announcement.image" alt="Announcement" />
        <span class="zoom-label">Click to zoom</span>
      </div>

      <!-- Reactions -->
      <div class="card-reactions">
        <div class="reaction-left">
          <button class="reaction-btn" (click)="toggleLike(announcement)">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/>
              <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
            </svg>
            {{ announcement.likes }}
          </button>
          <button class="reaction-btn" (click)="toggleDislike(announcement)">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/>
              <path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/>
            </svg>
          </button>
        </div>
        <button class="comment-btn" (click)="toggleComment(announcement)">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          {{ announcement.comments }}
        </button>
      </div>

    </div>
  </div>

</div>
