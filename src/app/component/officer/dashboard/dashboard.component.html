<!-- officer-dashboard.component.html -->
<div class="dashboard-wrapper">

  <!-- Header -->
  <div class="dashboard-header">
    <div class="header-left">
      <h2 class="org-name">Student Organization</h2>
      <span class="role-badge">(OFFICER)</span>
    </div>
    <button class="logout-btn" (click)="onLogout()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Logout
    </button>
  </div>

  <!-- Action Buttons -->
  <div class="action-buttons">
    <button class="action-btn" (click)="goToCreateAnnouncement()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      Create Announcement
    </button>
    <button class="action-btn" (click)="goToQrCodes()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
      </svg>
      QR Codes
    </button>
    <button class="action-btn" (click)="goToEvents()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      View Events
    </button>
  </div>

  <!-- Announcements List -->
  <div class="announcements-container">
    <div *ngFor="let announcement of announcements" class="announcement-card">
      <div class="card-header">
        <h3 class="announcement-title">{{ announcement.title }}</h3>
        <span class="status-badge" [ngClass]="announcement.status === 'approved' ? 'approved' : 'pending'">
          <svg *ngIf="announcement.status === 'approved'" xmlns="http://www.w3.org/2000/svg"
            width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <svg *ngIf="announcement.status === 'pending'" xmlns="http://www.w3.org/2000/svg"
            width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          {{ announcement.status === 'approved' ? 'Approved' : 'Pending Approval' }}
        </span>
      </div>
      <div class="card-meta">By {{ announcement.author }} • {{ announcement.date }}</div>
      <div class="card-courses">{{ announcement.courses }}</div>
      <p class="card-content">{{ announcement.content }}</p>
      <div *ngIf="announcement.image" class="card-image">
        <img [src]="announcement.image" alt="Announcement image" />
        <span class="zoom-label">Click to zoom</span>
      </div>
    </div>
  </div>

</div>
