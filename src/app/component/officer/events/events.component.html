<!-- events.component.html -->
<div class="page-wrapper">

  <!-- Header -->
  <div class="page-header">
    <button class="back-btn" (click)="goBack()">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Back to Dashboard
    </button>
    <div class="header-title-row">
      <div class="header-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <h2>Events</h2>
      </div>
      <button class="create-event-btn" (click)="createEvent()">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        Create Event
      </button>
    </div>
  </div>

  <!-- Events List -->
  <div class="events-container">
    <div *ngFor="let event of events" class="event-card">
      <h3 class="event-title">{{ event.title }}</h3>
      <div class="event-meta">By {{ event.author }} • {{ event.course }}</div>
      <p class="event-content">{{ event.description }}</p>

      <div class="event-details">
        <div class="event-detail-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          {{ event.date }}
        </div>
        <div class="event-detail-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          {{ event.time }}
        </div>
        <div class="event-detail-item">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
            <circle cx="12" cy="10" r="3"/>
          </svg>
          {{ event.location }}
        </div>
      </div>

      <div class="event-divider"></div>

      <div class="event-footer">
        <div class="attendees">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
          {{ event.attendees }} Attendees
        </div>
        <button class="show-qr-btn" (click)="showQR(event)">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
          </svg>
          Show QR Code
        </button>
      </div>
    </div>
  </div>

  <!-- Create Event Modal -->
  <div class="modal-overlay" *ngIf="showCreateModal" (click)="closeModal()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>Create New Event</h3>
        <button class="modal-close" (click)="closeModal()">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-group">
          <label>Event Title *</label>
          <input type="text" [(ngModel)]="newEvent.title" placeholder="Enter event title" />
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea [(ngModel)]="newEvent.description" placeholder="Describe the event..." rows="3"></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Date *</label>
            <input type="date" [(ngModel)]="newEvent.date" />
          </div>
          <div class="form-group">
            <label>Time *</label>
            <input type="time" [(ngModel)]="newEvent.time" />
          </div>
        </div>

        <div class="form-group">
          <label>Location *</label>
          <input type="text" [(ngModel)]="newEvent.location" placeholder="e.g. IT Lab 201" />
        </div>

        <div class="form-group">
          <label>Department / Course</label>
          <select [(ngModel)]="newEvent.course">
            <option value="IT">IT</option>
            <option value="EMT">EMT</option>
            <option value="TCM">TCM</option>
            <option value="ALL">All Departments</option>
          </select>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" (click)="closeModal()">Cancel</button>
        <button class="btn-submit" (click)="submitEvent()">Create Event</button>
      </div>
    </div>
  </div>

</div>
