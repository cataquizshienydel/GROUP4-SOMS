<!-- main-layout.component.html -->
<div class="layout-wrapper">

  <!-- Topbar -->
  <app-topbar (toggleSidebar)="onToggleSidebar()"></app-topbar>

  <!-- Overlay for mobile -->
  <div class="sidebar-overlay" *ngIf="sidebarOpen" (click)="onToggleSidebar()"></div>

  <!-- Below topbar -->
  <div class="layout-body">
    <!-- Sidebar -->
    <app-sidebar [isOpen]="sidebarOpen"></app-sidebar>

    <!-- Content Area -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
